services:
  - type: web
    name: karlc-ai-buddy
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: FB_PAGE_ID
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: FB_APP_SECRET
        sync: false
      - key: FB_VERIFY_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: SEMAPHORE_API_KEY
        sync: false
      - key: SEMAPHORE_SENDER_NAME
        sync: false
